{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar Sesión | Facturación Electrónica</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" crossorigin="anonymous" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Source Sans 3', sans-serif;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Fondo animado */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(14,165,233,.14) 0%, transparent 65%);
      top: -200px; left: -200px;
      animation: glow1 9s ease-in-out infinite;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,.11) 0%, transparent 65%);
      bottom: -150px; right: -150px;
      animation: glow2 11s ease-in-out infinite;
    }
    @keyframes glow1 { 0%,100%{transform:scale(1) translate(0,0)} 50%{transform:scale(1.2) translate(40px,25px)} }
    @keyframes glow2 { 0%,100%{transform:scale(1) translate(0,0)} 50%{transform:scale(1.15) translate(-25px,-35px)} }

    /* Partículas */
    .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .particle {
      position: absolute; border-radius: 50%;
      background: rgba(14,165,233,.35);
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* Card */
    .login-wrapper { position: relative; z-index: 10; width: 100%; max-width: 460px; padding: 1rem; }

    .login-card {
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 2.6rem 2.6rem 2.2rem;
      box-shadow: 0 30px 60px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.05);
      animation: slideUp .55s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Encabezado */
    .login-head { text-align: center; margin-bottom: 2rem; }
    .logo-box {
      width: 70px; height: 70px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 30px rgba(14,165,233,.38);
      font-size: 1.9rem; color: #fff;
    }
    .login-head h1 { font-size: 1.45rem; font-weight: 700; color: #f1f5f9; }
    .login-head p  { font-size: .83rem; color: #94a3b8; margin-top: 3px; }
    .sunat-tag {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(14,165,233,.1);
      border: 1px solid rgba(14,165,233,.22);
      border-radius: 20px; padding: 3px 11px;
      font-size: .72rem; color: #7dd3fc; margin-top: 7px;
    }

    /* Alerta */
    .alert-err {
      display: none; align-items: center; gap: 8px;
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.24);
      border-radius: 10px; color: #fca5a5;
      font-size: .84rem; padding: .65rem .9rem;
      margin-bottom: 1.1rem;
      animation: shake .38s ease;
    }
    .alert-err.show { display: flex; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

    /* Inputs */
    .field-label {
      font-size: .78rem; font-weight: 600;
      color: #94a3b8; text-transform: uppercase;
      letter-spacing: .5px; margin-bottom: 6px;
    }
    .input-wrap { position: relative; margin-bottom: 1.1rem; }
    .input-wrap .ico {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: #475569; font-size: 1rem; z-index: 2; transition: color .2s;
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(255,255,255,.08);
      border-radius: 12px;
      color: #f1f5f9;
      padding: .72rem 2.7rem;
      font-size: .95rem;
      outline: none;
      transition: all .22s;
      font-family: inherit;
    }
    .input-wrap input::placeholder { color: #475569; }
    .input-wrap input:focus {
      background: rgba(14,165,233,.08);
      border-color: #0ea5e9;
      box-shadow: 0 0 0 3px rgba(14,165,233,.13);
    }
    .input-wrap input:focus ~ .ico,
    .input-wrap:focus-within .ico { color: #0ea5e9; }
    .input-wrap input.ok { border-color: rgba(16,185,129,.4); }

    .eye-btn {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #475569;
      cursor: pointer; font-size: 1rem; z-index: 3;
      transition: color .2s; line-height: 1;
    }
    .eye-btn:hover { color: #0ea5e9; }

    /* Botón */
    .btn-send {
      width: 100%; padding: .8rem;
      border-radius: 12px; border: none;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: #fff; font-size: .96rem; font-weight: 600;
      cursor: pointer; transition: all .22s;
      box-shadow: 0 4px 16px rgba(14,165,233,.3);
      position: relative; overflow: hidden;
      font-family: inherit;
    }
    .btn-send::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
      opacity: 0; transition: opacity .22s;
    }
    .btn-send:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(14,165,233,.42); }
    .btn-send:hover::after { opacity: 1; }
    .btn-send:active { transform: translateY(0); }
    .btn-send:disabled { opacity: .7; cursor: not-allowed; transform: none; }

    .spin {
      display: none; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: rot .7s linear infinite; margin: 0 auto;
    }
    .btn-send.loading .btn-txt { display: none; }
    .btn-send.loading .spin     { display: block; }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* Divisor */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 1.4rem 0 1rem;
    }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.07); }
    .divider span { font-size: .74rem; color: #475569; white-space: nowrap; }

    /* Chips de roles */
    .roles { display: flex; gap: 8px; justify-content: center; }
    .chip {
      display: flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 8px; padding: 4px 10px;
      font-size: .72rem; color: #64748b;
    }
    .chip.a { color: #f59e0b; border-color: rgba(245,158,11,.2); }
    .chip.e { color: #10b981; border-color: rgba(16,185,129,.2); }
    .chip.c { color: #8b5cf6; border-color: rgba(139,92,246,.2); }

    /* Footer */
    .foot { text-align: center; margin-top: 1.5rem; font-size: .74rem; color: #334155; }
  </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="particles" id="pts"></div>

<div class="login-wrapper">
  <div class="login-card">

    <div class="login-head">
      <div class="logo-box"><i class="bi bi-receipt-cutoff"></i></div>
      <h1>Facturación Electrónica</h1>
      <p>Sistema de emisión de comprobantes</p>
      <div class="sunat-tag">
        <i class="bi bi-shield-check-fill"></i> Homologado SUNAT Beta
      </div>
    </div>

    <div class="alert-err" id="alertErr">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span id="alertTxt">Credenciales incorrectas.</span>
    </div>

    <form id="frm" novalidate>
      {% csrf_token %}

      <div class="field-label">Usuario</div>
      <div class="input-wrap">
        <i class="bi bi-person-fill ico"></i>
        <input type="text" id="usr" placeholder="Ingresa tu usuario" autocomplete="username" required />
      </div>

      <div class="field-label">Contraseña</div>
      <div class="input-wrap" style="margin-bottom:1.4rem">
        <i class="bi bi-lock-fill ico"></i>
        <input type="password" id="pwd" placeholder="Ingresa tu contraseña" autocomplete="current-password" required />
        <button type="button" class="eye-btn" id="eyeBtn" tabindex="-1">
          <i class="bi bi-eye-slash" id="eyeIco"></i>
        </button>
      </div>

      <button type="submit" class="btn-send" id="btn">
        <span class="btn-txt"><i class="bi bi-box-arrow-in-right" style="margin-right:.4rem"></i>Iniciar Sesión</span>
        <div class="spin"></div>
      </button>
    </form>

    <div class="divider"><span>Roles del sistema</span></div>
    <div class="roles">
      <div class="chip a"><i class="bi bi-shield-fill-check"></i> Admin</div>
      <div class="chip e"><i class="bi bi-file-earmark-text-fill"></i> Emisor</div>
      <div class="chip c"><i class="bi bi-calculator-fill"></i> Contador</div>
    </div>

  </div>
  <div class="foot">&copy; 2026 Sistema de Facturación Electrónica &mdash; Perú</div>
</div>

<script>
  // Partículas
  const pts = document.getElementById('pts');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = 2 + Math.random() * 3;
    p.style.cssText = `left:${Math.random()*100}%;width:${s}px;height:${s}px;`
      + `animation-duration:${9+Math.random()*14}s;animation-delay:${Math.random()*10}s;`
      + `opacity:${.2+Math.random()*.4}`;
    pts.appendChild(p);
  }

  // Toggle password
  document.getElementById('eyeBtn').addEventListener('click', () => {
    const f = document.getElementById('pwd');
    const show = f.type === 'password';
    f.type = show ? 'text' : 'password';
    document.getElementById('eyeIco').className = show ? 'bi bi-eye' : 'bi bi-eye-slash';
  });

  // Validación visual
  ['usr','pwd'].forEach(id => {
    document.getElementById(id).addEventListener('input', function(){
      this.classList.toggle('ok', this.value.length > 0);
    });
  });

  // Ir al siguiente campo con Enter
  document.getElementById('usr').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('pwd').focus(); }
  });

  // Submit
  document.getElementById('frm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn     = document.getElementById('btn');
    const alertEl = document.getElementById('alertErr');
    const alertTx = document.getElementById('alertTxt');
    const usr     = document.getElementById('usr').value.trim();
    const pwd     = document.getElementById('pwd').value;

    if (!usr || !pwd) {
      alertTx.textContent = 'Por favor completa todos los campos.';
      alertEl.classList.add('show');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;
    alertEl.classList.remove('show');

    try {
      const resp = await fetch('/api/auth/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: usr, password: pwd }),
      });
      const data = await resp.json();

      if (resp.ok) {
        // Guardar en localStorage para las llamadas API
        localStorage.setItem('access',  data.access);
        localStorage.setItem('refresh', data.refresh);
        localStorage.setItem('usuario', JSON.stringify(data.usuario));

        // Guardar en cookie para que el middleware Django lo lea
        // SameSite=Strict evita CSRF desde otros dominios
        const exp = new Date(Date.now() + 8*60*60*1000).toUTCString();
        document.cookie = `access_token=${data.access}; path=/; expires=${exp}; SameSite=Strict`;

        // Feedback de éxito
        btn.classList.remove('loading');
        btn.innerHTML = '<span class="btn-txt"><i class="bi bi-check-circle-fill" style="margin-right:.4rem"></i>Acceso concedido</span>';
        btn.style.background = 'linear-gradient(135deg,#10b981,#059669)';

        setTimeout(() => { window.location.href = '/'; }, 650);

      } else {
        btn.classList.remove('loading');
        btn.disabled = false;
        alertTx.textContent = data.detail || data.non_field_errors?.[0] || 'Credenciales incorrectas.';
        alertEl.classList.add('show');
      }

    } catch {
      btn.classList.remove('loading');
      btn.disabled = false;
      alertTx.textContent = 'Error de conexión. Verifica tu red.';
      alertEl.classList.add('show');
    }
  });
</script>
</body>
</html>

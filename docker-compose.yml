version: '3.8'

services:
  db:
    image: postgres:15
    container_name: container_facturacion
    restart: always
    environment:
      POSTGRES_DB: db_facturacion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sunat_secure_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
